name: Deploy Frontend

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch, tag o commit a desplegar'
        required: true
        default: main

concurrency:
  group: deploy-frontend
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & Deploy to S3
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build --prefix apps/frontend
        env:
          NEXT_PUBLIC_BUILD_RUN_NUMBER: ${{ github.run_number }}
          NEXT_PUBLIC_BUILD_RUN_ID: ${{ github.run_id }}
          NEXT_PUBLIC_GIT_SHA: ${{ github.sha }}
          NEXT_PUBLIC_BUILD_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Sync to S3
        run: |
          aws s3 sync apps/frontend/out s3://${{ secrets.FRONTEND_BUCKET }} \
            --delete \
            --cache-control "public, max-age=31536000, immutable"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.FRONTEND_DISTRIBUTION_ID }} \
            --paths "/*"
